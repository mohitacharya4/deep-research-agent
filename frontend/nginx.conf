server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service. SSE needs buffering disabled so
    # events reach the browser as they are produced.
    location /research {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
